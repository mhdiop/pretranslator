name: Auto translate TS

on:
  push:
    paths:
      - "**.ts"

jobs:
  translate:

    # évite la boucle infinie quand le bot commit
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run translation script
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          python scripts/auto_translate_ts.py

      - name: Create Pull Request with translations
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          branch: translation-bot
          base: main

          commit-message: "Automatic translations using DeepL"
          title: "Automatic translation update"
          body: |
            Automatic translations generated through DeepL Free API.

            Please review before merging.

          labels: |
            translations
            automated

          delete-branch: true